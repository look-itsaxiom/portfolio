<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Left ear -->
  <polygon points="5,14 9,4 13,14" fill="none" stroke="#a3e635" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right ear -->
  <polygon points="19,14 23,4 27,14" fill="none" stroke="#a3e635" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left eye -->
  <circle cx="11" cy="18" r="2.5" fill="#a3e635"/>
  <!-- Right eye -->
  <circle cx="21" cy="18" r="2.5" fill="#a3e635"/>
  <!-- Nose (the ^) -->
  <polyline points="14,23 16,21 18,23" fill="none" stroke="#a3e635" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
